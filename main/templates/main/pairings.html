<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ tournament.name }}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
          rel="stylesheet">
              {% load static %}
    <link rel="stylesheet" href="{% static 'main/css/tournament_detail.css' %}">
</head>

<body>

{% include "main/navbar.html" %}

<div class="container mt-4">
    <div class="card mt-4 mb-4">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="action" value="select_players">
                
                <div class="row g-2">
                {% for participant in participants %}
                    <div class="col-md-6">
                        participant: {{ participant.player.name }} ({{ participant.player.rating }})
                    </div>
                    <div class="col-md-6">
                        <input type="checkbox" name="selected_players" value="{{ participant.player.name }}" class="form-check-input" checked>
                    </div>
                {% endfor %}
                </div>

                <button type="submit" class="btn btn-success mt-3">Ok</button>
            </form>
        </div>
    </div>    
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
