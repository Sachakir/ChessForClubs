<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tournaments</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
          rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'main/css/tournament_detail.css' %}">
</head>
<body>

{% include "main/navbar.html" %}

<div class="container mt-4">
    <h1 class="mb-4">Available Chess Tournaments</h1>

    <div class="card">
        <div class="card-body">
            <ul class="list-group list-group-flush">
                {% for tournament in object_list %}
                    <li class="list-group-item d-flex justify-content-between align-items-center gap-3">
                        <a href="{% url 'tournament_detail' name=tournament.name %}" class="text-decoration-none">{{ tournament.name }}</a>
                        <small class="text-muted">{{ tournament.start_date }}</small>
                    </li>
                {% empty %}
                    <li class="list-group-item">No tournaments available.</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
